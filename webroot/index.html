<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Audio Sync</title>
  <link rel="stylesheet" href="styles.css">

  <script src="logger.js"></script>

  <!-- iOS debugger -->
  <!--
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  -->

</head>

<body>

  <div class="card">
    <h1>Public Audio Sync</h1>
    <p>It might take up to 60 seconds for it to start playing music</p>
    <button id="connectBtn">Connect</button>
    <button id="muteBtn" style="display: none; margin-top: 10px;">Mute</button>
    <div id="statusText" class="status disconnected">Disconnected</div>

    <div id="sendspin-demo-sync-panel" class="demo-card__sync" aria-hidden="true">
      <div class="demo-card__sync-head">
        <span class="demo-card__sync-title">Synchronization</span>
        <span id="sendspin-demo-sync-status" class="demo-card__sync-readout sync-idle">--.- ms</span>
      </div>
      <div id="sendspin-demo-sync-graph-shell" class="demo-card__sync-graph-shell sync-idle">
        <canvas id="sendspin-demo-sync-graph" class="demo-card__sync-graph" aria-label="Synchronization graph"></canvas>
      </div>
    </div>

    <div class="version" id="app-version"></div>
  </div>

  <div class="qr-container">
    <img src="qr.png" alt="Scan to sync" class="qr-code">
    <p class="qr-text">Scan to sync additional devices</p>
  </div>

  <button class="copy-logs-btn" onclick="copyDebugLogs()">📋 Copy Debug Logs</button>

  <script type="module" src="app.js"></script>
</body>

</html>
