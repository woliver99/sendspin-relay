<body>

  <div class="card">
    <h1>Public Audio Sync</h1>
    <p>It might take up to 60 seconds for it to start playing music</p>
    <button id="connectBtn">Connect</button>
    <div id="statusText" class="status disconnected">Disconnected</div>

    <img src="qr.png" alt="Scan to sync" class="qr-code">
